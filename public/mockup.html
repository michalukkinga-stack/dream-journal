<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Łapacz snów – podgląd</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }

    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #0a0a0a;
      border-radius: 54px;
      box-shadow:
        0 0 0 2px #3a3a3a,
        0 0 0 4px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 0 0 1px #2a2a2a;
    }

    /* Przyciski boczne */
    .phone::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 160px;
      width: 4px;
      height: 36px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #2a2a2a, 0 104px 0 #2a2a2a;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 200px;
      width: 4px;
      height: 72px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }

    .screen {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      border-radius: 48px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Dynamic Island */
    .island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }

    /* Home indicator */
    .home {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
      pointer-events: none;
    }

    .label {
      margin-top: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="phone">
      <div class="screen">
        <iframe src="/"></iframe>
      </div>
      <div class="island"></div>
      <div class="home"></div>
    </div>
    <p class="label">ŁAPACZ SNÓW · PODGLĄD</p>
  </div>
</body>
</html>
